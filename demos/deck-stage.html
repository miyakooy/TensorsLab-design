<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deck Stage Demo</title>
    <script src="../assets/deck_stage.js" type="module"></script>
    <style>
      html, body { margin: 0; min-height: 100%; background: #f8fafc; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
      body { padding: 24px; }
      .intro { display: grid; gap: 8px; margin-bottom: 18px; }
      .intro h1 { margin: 0; font-size: 28px; }
      .intro p { margin: 0; color: #64748b; line-height: 1.6; }
      .deck { border: 1px solid rgba(148, 163, 184, 0.24); border-radius: 24px; overflow: hidden; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08); }
    </style>
  </head>
  <body>
    <div class="intro">
      <h1>Deck Stage Demo</h1>
      <p>Keyboard: ← / → to move between slides.</p>
    </div>
    <div class="deck" id="deck"></div>
    <script type="module">
      import { DeckStage } from '../assets/deck_stage.js';
      const deck = document.getElementById('deck');
      deck.innerHTML = `
        <div style="padding:40px; background:#fff;">
          <h2 style="margin:0 0 12px;">TensorsLab intro slide</h2>
          <p style="margin:0; color:#475569;">A slide stage that can hold multiple slides and keyboard navigation.</p>
        </div>
      `;
    </script>
  </body>
</html>
