<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>喵大师 - AI桌面陪伴宠物</title>
  
  <!-- React + Babel with integrity hashes (exactly like Claude Design) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  
  <style>
    /* Global reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* iPhone frame - exact dimensions like Claude Design */
    const iosFrameStyles = {
      container: {
        position: 'relative',
        width: 390,
        height: 844,
        background: '#1a1a2e',
        borderRadius: 44,
        boxShadow: '0 0 0 12px #333, 0 0 0 14px #555, 0 30px 60px rgba(0,0,0,0.5)',
        overflow: 'hidden',
        margin: 'auto',
      },
      notch: {
        position: 'absolute',
        top: 0,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 160,
        height: 32,
        background: '#000',
        borderRadius: '0 0 20px 20px',
        zIndex: 100,
      },
      homeIndicator: {
        position: 'absolute',
        bottom: 8,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 134,
        height: 5,
        background: 'rgba(255,255,255,0.3)',
        borderRadius: 3,
      },
    };

    /* App styles - proper design tokens */
    const appTokens = {
      bg: '#1a1a2e',
      surface: '#16213e', 
      card: '#0f3460',
      accent: '#e94560',
      accent2: '#f5a623',
      text: '#ffffff',
      textSecondary: '#a0a0b0',
      green: '#4ade80',
    };
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;
    
    // ===== Components (exactly like Claude Design patterns) =====
    
    // 1. StatusBar component
    const StatusBar = ({ time, battery }) => (
      <div style={{
        display: 'flex',
        justifyContent: 'space-between',
        padding: '14px 24px 0',
        fontSize: 13,
        fontWeight: 600,
        color: appTokens.text,
        fontFamily: 'SF Pro Display, -apple-system, sans-serif',
      }}>
        <span>{time}</span>
        <span>🔋 {battery}%</span>
      </div>
    );

    // 2. Avatar with float animation
    const Avatar = ({ emoji, gradient }) => (
      <div style={{
        width: 100,
        height: 100,
        background: `linear-gradient(135deg, ${gradient[0]}, ${gradient[1]})`,
        borderRadius: '50%',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontSize: 48,
        boxShadow: '0 8px 30px rgba(233, 69, 96, 0.3)',
        animation: 'float 3s ease-in-out infinite',
        margin: '0 auto 16px',
      }}>
        {emoji}
      </div>
    );

    // 3. FeatureCard with proper touch feedback
    const FeatureCard = ({ icon, title, description }) => {
      const [active, setActive] = useState(false);
      
      return (
        <div 
          style={{
            display: 'flex',
            alignItems: 'center',
            gap: 16,
            padding: 16,
            background: appTokens.surface,
            borderRadius: 16,
            transition: 'all 0.15s ease',
            transform: active ? 'scale(0.98)' : 'scale(1)',
            cursor: 'pointer',
          }}
          onMouseDown={() => setActive(true)}
          onMouseUp={() => setActive(false)}
          onMouseLeave={() => setActive(false)}
        >
          <div style={{
            width: 48,
            height: 48,
            background: appTokens.card,
            borderRadius: 12,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            fontSize: 24,
          }}>
            {icon}
          </div>
          <div>
            <h3 style={{
              fontSize: 15,
              fontWeight: 600,
              color: appTokens.text,
              marginBottom: 4,
            }}>{title}</h3>
            <p style={{
              fontSize: 12,
              color: appTokens.textSecondary,
            }}>{description}</p>
          </div>
        </div>
      );
    };

    // 4. ActionButton
    const ActionButton = ({ children, primary }) => (
      <button style={{
        flex: 1,
        padding: '14px 16px',
        background: primary ? appTokens.accent : appTokens.card,
        border: 'none',
        borderRadius: 12,
        color: appTokens.text,
        fontSize: 14,
        fontWeight: 600,
        cursor: 'pointer',
        transition: 'all 0.15s ease',
      }}>
        {children}
      </button>
    );

    // 5. ChatBubble
    const ChatBubble = ({ children, isOwn }) => (
      <div style={{
        background: isOwn ? appTokens.accent : appTokens.card,
        padding: '12px 16px',
        borderRadius: isOwn ? '16px 16px 16px 4px' : '16px 16px 4px 16px',
        fontSize: 14,
        lineHeight: 1.5,
        maxWidth: '85%',
        marginBottom: 8,
        alignSelf: isOwn ? 'flex-end' : 'flex-start',
        marginLeft: isOwn ? 'auto' : 0,
      }}>
        {children}
      </div>
    );

    // 6. BottomNav
    const BottomNav = ({ activeTab }) => {
      const tabs = [
        { icon: '🏠', label: '首页', key: 'home' },
        { icon: '📋', label: '任务', key: 'tasks' },
        { icon: '⏰', label: '提醒', key: 'remind' },
        { icon: '⚙️', label: '设置', key: 'settings' },
      ];
      
      return (
        <div style={{
          position: 'absolute',
          bottom: 0,
          left: 0,
          right: 0,
          display: 'flex',
          justifyContent: 'space-around',
          padding: '12px 20px 28px',
          background: appTokens.surface,
          borderRadius: '0 0 44px 44px',
        }}>
          {tabs.map(tab => (
            <div key={tab.key} style={{
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              gap: 4,
              fontSize: 10,
              color: activeTab === tab.key ? appTokens.accent : appTokens.textSecondary,
              cursor: 'pointer',
            }}>
              <span style={{ fontSize: 24 }}>{tab.icon}</span>
              <span>{tab.label}</span>
            </div>
          ))}
        </div>
      );
    };

    // 7. StatusBadge
    const StatusBadge = ({ children }) => (
      <div style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: 6,
        padding: '6px 12px',
        background: 'rgba(74, 222, 128, 0.15)',
        color: appTokens.green,
        borderRadius: 20,
        fontSize: 12,
        marginTop: 12,
      }}>
        <span style={{
          width: 6,
          height: 6,
          background: appTokens.green,
          borderRadius: '50%',
        }} />
        {children}
      </div>
    );

    // ===== Main App =====
    const MeowMasterApp = () => {
      const [activeTab, setActiveTab] = useState('home');
      const [chatMessages, setChatMessages] = useState([
        { text: '检测到你在coding，需要启动大师模式帮你吗？🐱', own: false },
        { text: '好啊，启动吧！', own: true },
        { text: '收到！切换到大师模式中... 🔧', own: false },
      ]);
      
      const addMessage = (text, own) => {
        setChatMessages([...chatMessages, { text, own }]);
      };
      
      const features = [
        { icon: '🧠', title: '聪明小脑瓜', desc: '内置AI模型，理解你的每句话' },
        { icon: '⏰', title: '定时提醒', desc: 'Push通知，叫你起床、提醒会议' },
        { icon: '📋', title: '任务状态', desc: '实时播报，任务进度随时看' },
        { icon: '⚡', title: '大师模式', desc: '复杂Coding任务自动启动' },
      ];
      
      return (
        <div style={iosFrameStyles.container}>
          {/* Notch */}
          <div style={iosFrameStyles.notch} />
          
          {/* Status Bar */}
          <StatusBar time="9:41" battery={88} />
          
          {/* Main Content */}
          <div style={{
            padding: '60px 20px 100px',
            height: '100%',
            overflowY: 'auto',
          }}>
            {/* Header */}
            <div style={{ textAlign: 'center', marginBottom: 24 }}>
              <Avatar emoji="🐱" gradient={[appTokens.accent, appTokens.accent2]} />
              <h1 style={{
                fontSize: 24,
                fontWeight: 700,
                color: appTokens.text,
                marginBottom: 4,
              }}>喵大师</h1>
              <p style={{
                fontSize: 13,
                color: appTokens.textSecondary,
              }}>你的桌面AI陪伴宠物</p>
              <StatusBadge>在线 · 随时待命</StatusBadge>
            </div>
            
            {/* Features Grid */}
            <div style={{ display: 'grid', gap: 12 }}>
              {features.map((f, i) => (
                <FeatureCard key={i} icon={f.icon} title={f.title} description={f.desc} />
              ))}
            </div>
            
            {/* Quick Actions */}
            <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
              <ActionButton>📝 新建任务</ActionButton>
              <ActionButton primary>💬 和喵聊天</ActionButton>
            </div>
            
            {/* Chat Preview */}
            <div style={{
              marginTop: 24,
              background: appTokens.surface,
              borderRadius: 16,
              padding: 16,
            }}>
              <div style={{
                fontSize: 13,
                color: appTokens.textSecondary,
                marginBottom: 12,
              }}>最近对话</div>
              
              {chatMessages.map((msg, i) => (
                <ChatBubble key={i} isOwn={msg.own}>{msg.text}</ChatBubble>
              ))}
            </div>
          </div>
          
          {/* Bottom Nav */}
          <BottomNav activeTab={activeTab} />
          
          {/* Home indicator */}
          <div style={iosFrameStyles.homeIndicator} />
        </div>
      );
    };

    // Render with no conflicts (exactly like Claude Design)
    Object.assign(window, {
      MeowMasterApp,
      StatusBar,
      Avatar,
      FeatureCard,
      ActionButton,
      ChatBubble,
      BottomNav,
      StatusBadge,
    });

    ReactDOM.render(<MeowMasterApp />, document.getElementById('root'));
  </script>
  
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
  
  <!-- View instructions -->
  <div style="position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;font-family:monospace;">
    💡 打开方式：在Finder中找到文件拖到Chrome浏览器<br>
    或运行 <code style="background:#333;padding:2px 6px;border-radius:4px;">open /Users/miaoy/Documents/Test/design/TensorsLab-design/demos/meow-master-app.html</code>
  </div>
</body>
</html>
