<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>喵大师 - AI桌面陪伴宠物</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #ffffff;
      --text2: #a0a0b0;
      --green: #4ade80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text);
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 44px;
      box-shadow: 0 0 0 12px #333, 0 0 0 14px #555, 0 30px 60px rgba(0,0,0,0.5);
      overflow: hidden;
      position: relative;
    }
    /* iPhone notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 32px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 14px 24px 0;
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 10;
    }
    /* Main content */
    .content {
      padding: 60px 20px 100px;
      height: 100%;
      overflow-y: auto;
    }
    /* Header with cat avatar */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 30px rgba(233, 69, 96, 0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .app-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .app-tagline {
      font-size: 13px;
      color: var(--text2);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(74, 222, 128, 0.15);
      color: var(--green);
      border-radius: 20px;
      font-size: 12px;
      margin-top: 12px;
    }
    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
    }
    /* Feature cards */
    .features {
      display: grid;
      gap: 12px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--surface);
      border-radius: 16px;
      transition: all 0.2s;
    }
    .feature:active { transform: scale(0.98); }
    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--card);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .feature-info h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .feature-info p {
      font-size: 12px;
      color: var(--text2);
    }
    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .action-btn {
      flex: 1;
      padding: 14px;
      background: var(--card);
      border: none;
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn.primary {
      background: var(--accent);
    }
    .action-btn:active { transform: scale(0.95); }
    /* Chat area */
    .chat-area {
      margin-top: 24px;
      background: var(--surface);
      border-radius: 16px;
      padding: 16px;
    }
    .chat-title {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .chat-bubble {
      background: var(--card);
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .chat-bubble.own {
      background: var(--accent);
      border-radius: 16px 16px 16px 4px;
      text-align: right;
    }
    /* Bottom nav */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 12px 20px 28px;
      background: var(--surface);
      border-radius: 0 0 44px 44px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text2);
      cursor: pointer;
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-icon {
      font-size: 24px;
    }
    /* Screen indicator */
    .screen-ind {
      position: absolute;
      top: 48px;
      right: 20px;
      background: var(--accent);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 9px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span>🔋 88%</span>
    </div>
    
    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="avatar">🐱</div>
        <h1 class="app-name">喵大师</h1>
        <p class="app-tagline">你的桌面AI陪伴宠物</p>
        <div class="status-badge">在线 · 随时待命</div>
      </div>
      
      <!-- Features -->
      <div class="features">
        <div class="feature">
          <div class="feature-icon">🧠</div>
          <div class="feature-info">
            <h3>聪明小脑瓜</h3>
            <p>内置AI模型，理解你的每句话</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">⏰</div>
          <div class="feature-info">
            <h3>定时提醒</h3>
            <p>Push通知，叫你起床、提醒会议</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">📋</div>
          <div class="feature-info">
            <h3>任务状态</h3>
            <p>实时播报，任务进度随时看</p>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">⚡</div>
          <div class="feature-info">
            <h3>大师模式</h3>
            <p>复杂Coding任务自动启动</p>
          </div>
        </div>
      </div>
      
      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="action-btn">📝 新建任务</button>
        <button class="action-btn primary">💬 和喵聊天</button>
      </div>
      
      <!-- Chat Preview -->
      <div class="chat-area">
        <div class="chat-title">最近对话</div>
        <div class="chat-bubble">
          喵：检测到你在coding，需要启动大师模式帮你吗？🐱
        </div>
        <div class="chat-bubble own">
          好啊，启动吧！
        </div>
        <div class="chat-bubble">
          收到！切换到大师模式中... 🔧
        </div>
      </div>
    </div>
    
    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">📋</span>
        <span>任务</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">⏰</span>
        <span>提醒</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span>设置</span>
      </div>
    </div>
    
    <div class="screen-ind">iOS原型</div>
  </div>
</body>
</html>
