<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>喵大师 - Android版</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --card: #eeeeee;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #1a1a2e;
      --text2: #666666;
      --green: #4ade80;
      --notch: #000000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text);
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .phone {
      width: 360px;
      height: 800px;
      background: var(--bg);
      border-radius: 32px;
      box-shadow: 0 0 0 8px #222, 0 0 0 10px #444, 0 30px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      position: relative;
    }
    /* Android punch-hole */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 28px;
      background: var(--notch);
      border-radius: 0 0 12px 12px;
      z-index: 100;
    }
    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 14px 20px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
    }
    /* Main content */
    .content {
      padding: 52px 16px 80px;
      height: 100%;
      overflow-y: auto;
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .avatar {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
    }
    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
    }
    .header-text p {
      font-size: 12px;
      color: var(--text2);
    }
    /* Status chip */
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(74, 222, 128, 0.15);
      color: #16a34a;
      border-radius: 12px;
      font-size: 11px;
      margin-top: 4px;
    }
    .status-chip::before {
      content: '';
      width: 5px;
      height: 5px;
      background: #16a34a;
      border-radius: 50%;
    }
    /* Features */
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .feature {
      padding: 16px;
      background: var(--surface);
      border-radius: 16px;
    }
    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .feature h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .feature p {
      font-size: 10px;
      color: var(--text2);
    }
    /* Chat preview */
    .chat-preview {
      margin-top: 16px;
      background: var(--surface);
      border-radius: 16px;
      padding: 12px;
    }
    .chat-title {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .chat-msg {
      font-size: 12px;
      line-height: 1.4;
    }
    .chat-msg .me { color: var(--accent); }
    /* Bottom nav - Android style */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 16px 24px;
      background: var(--bg);
      border-top: 1px solid var(--card);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text2);
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 22px; }
    /* Screen indicator */
    .screen-ind {
      position: absolute;
      top: 36px;
      right: 16px;
      background: var(--accent);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span>🔋 88%</span>
    </div>
    
    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="avatar">🐱</div>
        <div class="header-text">
          <h1>喵大师</h1>
          <p>你的桌面AI宠物</p>
          <div class="status-chip">在线 · 随时待命</div>
        </div>
      </div>
      
      <!-- Features 2x2 -->
      <div class="features">
        <div class="feature">
          <div class="feature-icon">🧠</div>
          <h3>聪明小脑瓜</h3>
          <p>AI智能理解</p>
        </div>
        <div class="feature">
          <div class="feature-icon">⏰</div>
          <h3>定时提醒</h3>
          <p>Push通知</p>
        </div>
        <div class="feature">
          <div class="feature-icon">📋</div>
          <h3>任务状态</h3>
          <p>实时播报</p>
        </div>
        <div class="feature">
          <div class="feature-icon">⚡</div>
          <h3>大师模式</h3>
          <p>Coding助手</p>
        </div>
      </div>
      
      <!-- Chat -->
      <div class="chat-preview">
        <div class="chat-title">最近对话</div>
        <div class="chat-msg">
          <p><span class="me">我：</span> 检测到在coding</p>
          <p>🐱：切换到大师模式中...</p>
        </div>
      </div>
    </div>
    
    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">📋</span>
        <span>任务</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">💬</span>
        <span>对话</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span>设置</span>
      </div>
    </div>
    
    <div class="screen-ind">Android</div>
  </div>
</body>
</html>
